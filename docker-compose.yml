services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: roofvisor-app
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3000
    expose:
      - "3000"
    networks:
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=coolify"
      - "traefik.http.routers.roofvisor-insecure.entrypoints=http"
      - "traefik.http.routers.roofvisor-insecure.rule=Host(`leadsbystorm.com`) || Host(`www.leadsbystorm.com`)"
      - "traefik.http.routers.roofvisor-insecure.middlewares=roofvisor-redirect"
      - "traefik.http.middlewares.roofvisor-redirect.redirectscheme.scheme=https"
      - "traefik.http.routers.roofvisor-secure.entrypoints=https"
      - "traefik.http.routers.roofvisor-secure.rule=Host(`leadsbystorm.com`) || Host(`www.leadsbystorm.com`)"
      - "traefik.http.routers.roofvisor-secure.tls=true"
      - "traefik.http.routers.roofvisor-secure.tls.certresolver=letsencrypt"
      - "traefik.http.routers.roofvisor-secure.service=roofvisor-service"
      - "traefik.http.services.roofvisor-service.loadbalancer.server.port=3000"

networks:
  coolify:
    external: true
