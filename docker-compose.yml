version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: roofvisor-app
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3000
    expose:
      - "3000"

  web:
    image: nginx:alpine
    container_name: roofvisor-web
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/leadsbystorm.crt:/etc/nginx/ssl/leadsbystorm.crt:ro
      - ./infra/leadsbystorm.key:/etc/nginx/ssl/leadsbystorm.key:ro
    depends_on:
      - app
